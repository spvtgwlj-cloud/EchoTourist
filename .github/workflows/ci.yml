name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check app/

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./src/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: echo_tours_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ./src/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: 全量测试套件
        run: pytest
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/echo_tours_test
      - name: 回归安全门禁
        if: success()
        run: pytest tests/test_regression.py tests/test_negative_path.py tests/test_edge_cases.py tests/test_security.py -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/echo_tours_test

  test-e2e:
    runs-on: ubuntu-latest
    needs: [test-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
        working-directory: ./src/frontend
      - name: 安装 Playwright 浏览器
        run: npx playwright install chromium --with-deps
        working-directory: ./src/frontend
      - name: 启动服务
        run: docker compose up -d postgres redis backend frontend
      - name: 等待就绪
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health > /dev/null && echo "Backend ready" && break
            sleep 3
          done
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000 > /dev/null && echo "Frontend ready" && break
            sleep 3
          done
      - name: 运行 E2E 回归测试
        run: npx playwright test tests/e2e/regression-*.spec.ts --reporter=list
        env:
          BASE_URL: http://localhost:3000
      - name: 清理
        if: always()
        run: docker compose down

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
