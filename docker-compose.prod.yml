# ═══════════════════════════════════════════════════
# Echo Tours — 生产环境 Docker Compose
#
# 用法：
#   docker compose -f docker-compose.prod.yml up -d
#   或:  make prod
#
# 前置条件：
#   1. 在项目根目录创建 .env 文件（参考 .env.example）
#   2. 确保 Docker + Docker Compose 已安装
#
# 服务架构：
#   nginx          — 反向代理（统一入口 :80）
#   postgres       — PostgreSQL 16 数据库
#   redis          — Redis 7 缓存 / Celery 消息代理
#   elasticsearch  — Elasticsearch 8 搜索（可选）
#   migrations     — 数据库迁移（一次性运行后退出）
#   backend        — FastAPI 应用（4 workers）
#   frontend       — Next.js 15（standalone 模式）
#   celery_worker  — Celery 异步任务消费者
#   celery_beat    — Celery 定时调度器
# ═══════════════════════════════════════════════════

services:

  # ── Nginx 反向代理 ─────────────────────────────
  # 统一入口点：端口 80
  # 前端请求 → frontend:3000
  # API 请求  → backend:8000
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./infrastructure/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - echo-tours
    deploy:
      resources:
        limits:
          memory: 64M

  # ── PostgreSQL ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: echo_tours
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d echo_tours"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - echo-tours
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M

  # ── Redis ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - echo-tours
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ── Elasticsearch ─────────────────────────────
  # 可选服务：若资源有限或不需要全文搜索可注释掉
  elasticsearch:
    image: elasticsearch:8.17.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - node.name=echo-tours-es
      - cluster.name=echo-tours
      - bootstrap.memory_lock=true
    ports:
      - "${ES_PORT:-9200}"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"green\"|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - echo-tours
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    ulimits:
      memlock:
        soft: -1
        hard: -1

  # ── 数据库迁移 ───────────────────────────────
  # 一次性运行：启动时自动执行 alembic upgrade head
  # 运行成功退出后 backend 才会启动
  migrations:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      target: prod
    entrypoint: ["sh", "-c"]
    command: >
      "PYTHONPATH=/app alembic upgrade head 2>&1 || echo 'WARNING: Migration failed, tables may already exist'"
    env_file: .env
    environment:
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/echo_tours
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - echo-tours

  # ── FastAPI 后端 ─────────────────────────────
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      target: prod
    env_file: .env
    environment:
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/echo_tours
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/echo_tours
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - CORS_ORIGINS=http://localhost:80,${CORS_ORIGINS:-http://localhost}
      - FRONTEND_URL=http://localhost:80
    ports:
      - "${BACKEND_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - echo-tours
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; exit(0 if urllib.request.urlopen('http://localhost:8000/health').status == 200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Next.js 前端 ─────────────────────────────
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      target: prod
      args:
        - NEXT_PUBLIC_API_URL=
        - NEXT_PUBLIC_STRIPE_PUBLIC_KEY=${NEXT_PUBLIC_STRIPE_PUBLIC_KEY:-}
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    env_file: .env
    environment:
      - NODE_ENV=production
    ports:
      - "${FRONTEND_PORT:-3000}"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - echo-tours
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M

  # ── Celery Worker ────────────────────────────
  celery_worker:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      target: prod
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/echo_tours
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - echo-tours
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping -t 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Celery Beat ──────────────────────────────
  celery_beat:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      target: prod
    command: celery -A app.tasks.celery_app beat --loglevel=info -s /tmp/celerybeat-schedule
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - echo-tours
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s


# ── 持久化卷 ──────────────────────────────────
volumes:
  pgdata:
  esdata:
  redis_data:


# ── 网络 ──────────────────────────────────────
networks:
  echo-tours:
    driver: bridge
